<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <meta name="google-adsense-account" content="ca-pub-5570666195506674">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5570666195506674" crossorigin="anonymous"></script>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎱 로또 번호 추첨기</h1>
      <button class="theme-toggle" id="themeToggle" title="다크모드 전환">
        <span class="icon">🌙</span>
      </button>
    </header>

    <div class="controls">
      <label for="countInput">추첨 게임 수</label>
      <div class="count-wrapper">
        <button class="count-btn" id="decreaseBtn">−</button>
        <span class="count-display" id="countDisplay">1</span>
        <button class="count-btn" id="increaseBtn">+</button>
      </div>
      <span class="count-hint">최소 1개 · 최대 10개</span>
    </div>

    <button class="draw-btn" id="drawBtn">
      <span class="btn-text">번호 추첨</span>
    </button>

    <div class="results" id="results"></div>

    <button class="reset-btn" id="resetBtn" style="display:none;">초기화</button>

    <section class="contact-section">
      <h2 class="contact-title">📩 제휴 문의</h2>
      <form class="contact-form" id="contactForm" action="https://formspree.io/f/mqeyedrg" method="POST">
        <div class="form-group">
          <label for="name">이름 / 회사명</label>
          <input type="text" id="name" name="name" placeholder="홍길동 / (주)회사명" required />
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="제휴 관련 내용을 자유롭게 작성해 주세요." required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="submit-text">문의 보내기</span>
        </button>
        <p class="form-success" id="formSuccess" style="display:none;">✅ 문의가 접수되었습니다. 빠르게 답변드리겠습니다!</p>
      </form>
    </section>

    <section class="disqus-section">
      <h2 class="contact-title">💬 댓글</h2>
      <div id="disqus_thread"></div>
      <script>
        var disqus_config = function () {
          this.page.url = 'https://lottocreate-71bc4.web.app/';
          this.page.identifier = 'lotto-main';
        };
        (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://productbuilder-rv0csqtdxz.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
